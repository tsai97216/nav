<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi 的工具箱</title>

<!-- 引入 FontAwesome 圖標 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --bg-color: #0b0f19;
  --sidebar-bg: #111827;
  --card-bg: rgba(30, 41, 59, 0.7);
  --card-border: rgba(255, 255, 255, 0.08);
  --card-hover-border: #38bdf8;
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --accent-color: #38bdf8;
  --success-color: #34d399;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
  background-color: var(--bg-color);
  color: var(--text-main);
  display: flex;
  min-height: 100vh;
  line-height: 1.6;
}

/* 側邊導覽列 */
.sidebar {
  width: 280px;
  background-color: var(--sidebar-bg);
  padding: 30px 20px;
  position: fixed;
  height: 100vh;
  overflow-y: auto;
  border-right: 1px solid var(--card-border);
  display: flex;
  flex-direction: column;
  gap: 30px;
  z-index: 100;
}

.sidebar-header {
  padding: 0 10px;
}

.sidebar-header h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-main);
  letter-spacing: 0.5px;
}

.sidebar-header .version {
  font-size: 12px;
  color: var(--accent-color);
  font-family: monospace;
  display: block;
  margin-top: 4px;
}

.nav-menu {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  color: var(--text-muted);
  text-decoration: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.nav-item i {
  font-size: 16px;
  width: 20px;
  text-align: center;
}

.nav-item:hover, .nav-item.active {
  background-color: rgba(56, 189, 248, 0.1);
  color: var(--accent-color);
}

/* 主要內容區 */
main {
  margin-left: 280px;
  padding: 40px;
  width: calc(100% - 280px);
  max-width: 1400px;
}

.section {
  margin-bottom: 50px;
  scroll-margin-top: 40px;
}

.section-header {
  font-size: 24px;
  font-weight: 700;
  color: var(--text-main);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.section-header i {
  color: var(--accent-color);
  opacity: 0.9;
}

/* 子分類（Term）樣式 */
.term-container {
  margin-bottom: 30px;
}

.term-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--accent-color);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 14px;
  padding-left: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.term-title::before {
  content: '';
  display: inline-block;
  width: 5px;
  height: 5px;
  background-color: var(--accent-color);
  border-radius: 50%;
}

/* 卡片排版 */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.card {
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--card-border);
  padding: 18px;
  border-radius: 14px;
  text-decoration: none;
  color: var(--text-main);
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  cursor: pointer;
}

.card:hover {
  border-color: var(--card-hover-border);
  transform: translateY(-4px);
  box-shadow: 0 12px 24px -10px rgba(56, 189, 248, 0.25);
  background: rgba(30, 41, 59, 0.9);
}

.card-top {
  display: flex;
  align-items: center;
  gap: 12px;
}

.card-logo-container {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background-color: rgba(255, 255, 255, 0.08);
  flex-shrink: 0;
}

.card-logo {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 文字替代頭像樣式 */
.avatar-fallback {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 14px;
  color: #ffffff;
  text-transform: uppercase;
}

.card-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-main);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.card-desc {
  font-size: 13px;
  color: var(--text-muted);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  text-overflow: ellipsis;
  height: 41.6px;
}

/* 複製徽章 */
.copy-badge {
  position: absolute;
  top: 14px;
  right: 14px;
  font-size: 11px;
  background: rgba(56, 189, 248, 0.15);
  color: var(--accent-color);
  padding: 2px 8px;
  border-radius: 6px;
  border: 1px solid rgba(56, 189, 248, 0.3);
  font-weight: 500;
}

/* Toast 提示通知 */
.toast {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: #1e293b;
  border-left: 4px solid var(--success-color);
  padding: 16px 24px;
  border-radius: 8px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  color: var(--text-main);
  display: flex;
  flex-direction: column;
  gap: 4px;
  transform: translateY(150%);
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  z-index: 1000;
}

.toast.show {
  transform: translateY(0);
}

.toast-title {
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.toast-desc {
  font-size: 12px;
  color: var(--text-muted);
}

@media (max-width: 992px) {
  body {
    flex-direction: column;
  }

  .sidebar {
    position: sticky;
    top: 0;
    width: 100%;
    height: auto;
    padding: 20px;
    border-right: none;
    border-bottom: 1px solid var(--card-border);
    gap: 16px;
    background-color: rgba(17, 24, 39, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .nav-menu {
    flex-direction: row;
    overflow-x: auto;
    padding-bottom: 4px;
    gap: 8px;
    scrollbar-width: none;
  }

  .nav-menu::-webkit-scrollbar {
    display: none;
  }

  .nav-item {
    white-space: nowrap;
    padding: 8px 14px;
    font-size: 13px;
  }

  main {
    margin-left: 0;
    padding: 24px 16px;
    width: 100%;
  }

  .section {
    margin-bottom: 35px;
  }
}
</style>
</head>

// 高質感調色盤：為沒有 Logo 的網站動態分配漸層色替代頭像
const fallbackColors = [
  'linear-gradient(135deg, #3b82f6, #1d4ed8)', // 藍
  'linear-gradient(135deg, #10b981, #047857)', // 綠
  'linear-gradient(135deg, #8b5cf6, #6d28d9)', // 紫
  'linear-gradient(135deg, #f59e0b, #b45309)', // 橘
  'linear-gradient(135deg, #ec4899, #be185d)', // 粉
  'linear-gradient(135deg, #14b8a6, #0f766e)', // 青
  'linear-gradient(135deg, #ef4444, #b91c1c)'  // 紅
];

function stringToColorIndex(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = str.charCodeAt(i) + ((hash << 5) - hash);
  }
  return Math.abs(hash) % fallbackColors.length;
}

const navMenu = document.getElementById('js-nav-menu');
const mainContent = document.getElementById('js-main-content');

function createCardHtml(link) {
  const isCopy = link.is_copy ? 'true' : 'false';
  const copyAttr = link.is_copy ? `data-copy="${encodeURIComponent(link.copy_content)}"` : '';
  const copyBadge = link.is_copy ? `<span class="copy-badge"><i class="fa-regular fa-copy"></i> 腳本</span>` : '';
  
  // 核心改進：直接利用免費且高流速的兩大國際 Favicon API 作為主要源，若失敗則完美無縫切換至 CSS 高質感文字頭像！
  let domain = "";
  try {
    if(link.url.startsWith('http')) {
      domain = new URL(link.url).hostname;
    }
  } catch(e) {}
  
  // 使用官方高清 Favicon 鏡像源
  const primaryFavicon = domain ? `https://www.google.com/s2/favicons?sz=128&domain=${domain}` : '';
  const fallbackFavicon = domain ? `https://icon.horse/icon/${domain}` : '';
  
  const colorIndex = stringToColorIndex(link.title);
  const bgStyle = fallbackColors[colorIndex];
  const firstLetter = link.title.charAt(0);

  return `
    <div class="card" data-url="${link.url}" data-is-copy="${isCopy}" ${copyAttr}>
      ${copyBadge}
      <div class="card-top">
        <div class="card-logo-container" style="background: ${bgStyle};">
          ${domain ? `
            <img class="card-logo" src="${primaryFavicon}" alt="${link.title}" 
                 onerror="this.onerror=null; this.src='${fallbackFavicon}'; this.onerror=()=> { this.style.display='none'; this.nextElementSibling.style.display='flex'; }" />
          ` : ''}
          <div class="avatar-fallback" style="${domain ? 'display:none;' : 'display:flex;'}">${firstLetter}</div>
        </div>
        <div class="card-title">${link.title}</div>
      </div>
      <div class="card-desc" title="${link.description}">${link.description}</div>
    </div>
  `;
}

toolboxData.forEach((section, index) => {
  const sectionId = `section-${index}`;
  
  const navItem = document.createElement('a');
  navItem.className = `nav-item ${index === 0 ? 'active' : ''}`;
  navItem.href = `#${sectionId}`;
  navItem.innerHTML = `<i class="${section.icon}"></i><span>${section.taxonomy}</span>`;
  navMenu.appendChild(navItem);

  const sectionDom = document.createElement('section');
  sectionDom.className = 'section';
  sectionDom.id = sectionId;

  let innerContent = `
    <div class="section-header">
      <i class="${section.icon}"></i>
      <span>${section.taxonomy}</span>
    </div>
  `;

  if (section.links) {
    innerContent += `<div class="grid">`;
    section.links.forEach(link => { innerContent += createCardHtml(link); });
    innerContent += `</div>`;
  } else if (section.list) {
    section.list.forEach(subGroup => {
      innerContent += `
        <div class="term-container">
          <div class="term-title">${subGroup.term}</div>
          <div class="grid">
      `;
      subGroup.links.forEach(link => { innerContent += createCardHtml(link); });
      innerContent += `
          </div>
        </div>
      `;
    });
  }

  sectionDom.innerHTML = innerContent;
  mainContent.appendChild(sectionDom);
});

document.getElementById('js-main-content').addEventListener('click', function(e) {
  const card = e.target.closest('.card');
  if (!card) return;

  const isCopy = card.getAttribute('data-is-copy') === 'true';
  
  if (isCopy) {
    const rawContent = decodeURIComponent(card.getAttribute('data-copy'));
    navigator.clipboard.writeText(rawContent).then(() => {
      const toast = document.getElementById('js-toast');
      toast.classList.add('show');
      setTimeout(() => { toast.classList.remove('show'); }, 5000);
    }).catch(err => {
      alert('複製失敗，請手動複製程式碼。');
    });
  } else {
    const url = card.getAttribute('data-url');
    if (url && url !== 'javascript:void(0);') {
      window.open(url, '_blank', 'noopener,noreferrer');
    }
  }
});

window.addEventListener('scroll', () => {
  let current = '';
  const sections = document.querySelectorAll('.section');
  const navItems = document.querySelectorAll('.nav-item');
  
  sections.forEach(section => {
    const sectionTop = section.offsetTop;
    if (pageYOffset >= sectionTop - 60) {
      current = section.getAttribute('id');
    }
  });

  navItems.forEach(item => {
    item.classList.remove('active');
    if (item.getAttribute('href') === `#${current}`) {
      item.classList.add('active');
    }
  });
});
